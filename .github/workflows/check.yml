name: Check

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: 24
  PNPM_VERSION: 10.0.0
  TEST_RESULTS_DIR: artifacts/test-results
  COVERAGE_REPORT_DIR: artifacts/coverage-report

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  backend-format:
    name: Backend format
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Restore backend
        run: task setup:backend

      - name: Verify dotnet format
        run: task check:backend:format

  backend-build:
    name: Backend build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Restore backend
        run: task setup:backend

      - name: Build backend
        run: task build:backend

  backend-unit-tests:
    name: Backend unit tests
    runs-on: windows-latest
    needs:
      - backend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Restore backend
        run: task setup:backend

      - name: Build backend
        run: task build:backend

      - name: Run unit tests with coverage
        run: task test:ci:unit TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/unit"

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit test results
          path: ${{ env.TEST_RESULTS_DIR }}/unit/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/unit
          if-no-files-found: warn

      - name: Generate unit coverage report
        if: always()
        run: task test:ci:report TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/unit" COVERAGE_REPORT_DIR="${{ env.COVERAGE_REPORT_DIR }}/unit"

      - name: Add unit coverage summary
        if: always()
        shell: powershell
        run: |
          $summary = "${{ env.COVERAGE_REPORT_DIR }}/unit/SummaryGithub.md"
          if (Test-Path $summary) {
            Get-Content $summary | Add-Content $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: ${{ env.COVERAGE_REPORT_DIR }}/unit
          if-no-files-found: warn

  backend-integration-tests:
    name: Backend integration tests
    runs-on: ubuntu-latest
    needs:
      - backend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Restore backend
        run: task setup:backend

      - name: Build backend
        run: task build:backend

      - name: Run integration tests with coverage
        run: task test:ci:integration TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/integration"

      - name: Publish integration test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Integration test results
          path: ${{ env.TEST_RESULTS_DIR }}/integration/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/integration
          if-no-files-found: warn

      - name: Generate integration coverage report
        if: always()
        run: task test:ci:report TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/integration" COVERAGE_REPORT_DIR="${{ env.COVERAGE_REPORT_DIR }}/integration"

      - name: Add integration coverage summary
        if: always()
        shell: bash
        run: |
          summary="${{ env.COVERAGE_REPORT_DIR }}/integration/SummaryGithub.md"
          if [ -f "$summary" ]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: ${{ env.COVERAGE_REPORT_DIR }}/integration
          if-no-files-found: warn

  backend-rag-evaluation-tests:
    name: Backend RAG evaluation tests
    runs-on: ubuntu-latest
    needs:
      - backend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Restore backend
        run: task setup:backend

      - name: Build backend
        run: task build:backend

      - name: Run RAG evaluation tests with coverage
        run: task test:ci:rag TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/rag-evaluation"

      - name: Publish RAG evaluation test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: RAG evaluation test results
          path: ${{ env.TEST_RESULTS_DIR }}/rag-evaluation/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload RAG evaluation test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-evaluation-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/rag-evaluation
          if-no-files-found: warn

      - name: Generate RAG evaluation coverage report
        if: always()
        run: task test:ci:report TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/rag-evaluation" COVERAGE_REPORT_DIR="${{ env.COVERAGE_REPORT_DIR }}/rag-evaluation"

      - name: Add RAG evaluation coverage summary
        if: always()
        shell: bash
        run: |
          summary="${{ env.COVERAGE_REPORT_DIR }}/rag-evaluation/SummaryGithub.md"
          if [ -f "$summary" ]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload RAG evaluation coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-evaluation-coverage-report
          path: ${{ env.COVERAGE_REPORT_DIR }}/rag-evaluation
          if-no-files-found: warn

  backend-architecture-tests:
    name: Backend architecture tests
    runs-on: windows-latest
    needs:
      - backend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Restore backend
        run: task setup:backend

      - name: Build backend
        run: task build:backend

      - name: Run architecture tests
        run: task test:ci:architecture TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/architecture"

      - name: Publish architecture test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Architecture test results
          path: ${{ env.TEST_RESULTS_DIR }}/architecture/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload architecture test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/architecture
          if-no-files-found: warn

  frontend-format:
    name: Frontend format
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: task setup:frontend

      - name: Check Prettier formatting
        run: task check:frontend:format

  frontend-lint:
    name: Frontend lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: task setup:frontend

      - name: Run ESLint
        run: task check:frontend:lint

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: task setup:frontend

      - name: Run TypeScript
        run: task check:frontend:typecheck

  frontend-build:
    name: Frontend build
    runs-on: windows-latest
    needs:
      - frontend-lint
      - frontend-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install dependencies
        run: task setup:frontend

      - name: Build desktop frontend
        run: task build:frontend

  frontend-color-guard:
    name: Frontend color guard
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Check hardcoded colors
        run: task check:colors

  docker-compose:
    name: Docker compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Validate remote compose file
        run: task check:docker

  check-summary:
    name: Check summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-format
      - backend-build
      - backend-unit-tests
      - backend-integration-tests
      - backend-rag-evaluation-tests
      - backend-architecture-tests
      - frontend-format
      - frontend-lint
      - frontend-typecheck
      - frontend-build
      - frontend-color-guard
      - docker-compose

    steps:
      - name: Summarize job results
        run: |
          echo "## Check results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend format | ${{ needs.backend-format.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend build | ${{ needs.backend-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend unit tests | ${{ needs.backend-unit-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend integration tests | ${{ needs.backend-integration-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend RAG evaluation tests | ${{ needs.backend-rag-evaluation-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend architecture tests | ${{ needs.backend-architecture-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend format | ${{ needs.frontend-format.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend lint | ${{ needs.frontend-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend typecheck | ${{ needs.frontend-typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend build | ${{ needs.frontend-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend color guard | ${{ needs.frontend-color-guard.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker compose config | ${{ needs.docker-compose.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any check failed
        if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')
        run: exit 1
