name: Check

on:
  push:
    paths:
      - "backend/**"
      - "apps/desktop/**"
      - "infra/**"
      - ".config/task/**"
      - ".dockerignore"
      - "backend/.dockerignore"
      - "apps/desktop/.dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/check.yml"
  pull_request:
    paths:
      - "backend/**"
      - "apps/desktop/**"
      - "infra/**"
      - ".config/task/**"
      - ".dockerignore"
      - "backend/.dockerignore"
      - "apps/desktop/.dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/check.yml"
  workflow_dispatch:

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: 24
  PNPM_VERSION: 10.0.0
  TEST_RESULTS_DIR: artifacts/test-results
  COVERAGE_REPORT_DIR: artifacts/coverage-report

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.config/task/**'
            frontend:
              - 'apps/desktop/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.config/task/**'
            docker:
              - 'infra/**'
              - '.dockerignore'
              - 'backend/.dockerignore'
              - 'apps/desktop/.dockerignore'
              - '.config/task/**'
            docs:
              - 'docs/**'
              - 'README.md'
              - 'AGENTS.md'
              - 'GEMINI.md'

  backend-format:
    name: Backend format
    runs-on: windows-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore backend
        run: task -t .config/task/Taskfile.yml setup:backend

      - name: Verify dotnet format
        run: task -t .config/task/Taskfile.yml check:backend:format

  backend-build:
    name: Backend build
    runs-on: windows-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore backend
        run: task -t .config/task/Taskfile.yml setup:backend

      - name: Build backend
        run: task -t .config/task/Taskfile.yml build:backend

  backend-unit-tests:
    name: Backend unit tests
    runs-on: windows-latest
    needs:
      - changes
      - backend-build
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore backend
        run: task -t .config/task/Taskfile.yml setup:backend

      - name: Build backend
        run: task -t .config/task/Taskfile.yml build:backend

      - name: Run unit tests with coverage
        run: task -t .config/task/Taskfile.yml test:ci:unit TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/unit"

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit test results
          path: ${{ env.TEST_RESULTS_DIR }}/unit/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/unit
          if-no-files-found: warn

      - name: Generate unit coverage report
        if: always()
        run: task -t .config/task/Taskfile.yml test:ci:report TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/unit" COVERAGE_REPORT_DIR="${{ env.COVERAGE_REPORT_DIR }}/unit"

      - name: Add unit coverage summary
        if: always()
        shell: powershell
        run: |
          $summary = "${{ env.COVERAGE_REPORT_DIR }}/unit/SummaryGithub.md"
          if (Test-Path $summary) {
            Get-Content $summary | Add-Content $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: ${{ env.COVERAGE_REPORT_DIR }}/unit
          if-no-files-found: warn

  backend-integration-tests:
    name: Backend integration tests
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend-build
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore backend
        run: task -t .config/task/Taskfile.yml setup:backend

      - name: Build backend
        run: task -t .config/task/Taskfile.yml build:backend

      - name: Run integration tests with coverage
        run: task -t .config/task/Taskfile.yml test:ci:integration TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/integration"

      - name: Publish integration test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Integration test results
          path: ${{ env.TEST_RESULTS_DIR }}/integration/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/integration
          if-no-files-found: warn

      - name: Generate integration coverage report
        if: always()
        run: task -t .config/task/Taskfile.yml test:ci:report TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/integration" COVERAGE_REPORT_DIR="${{ env.COVERAGE_REPORT_DIR }}/integration"

      - name: Add integration coverage summary
        if: always()
        shell: bash
        run: |
          summary="${{ env.COVERAGE_REPORT_DIR }}/integration/SummaryGithub.md"
          if [ -f "$summary" ]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: ${{ env.COVERAGE_REPORT_DIR }}/integration
          if-no-files-found: warn

  backend-rag-evaluation-tests:
    name: Backend RAG evaluation tests
    runs-on: ubuntu-latest
    needs:
      - changes
      - backend-build
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore backend
        run: task -t .config/task/Taskfile.yml setup:backend

      - name: Build backend
        run: task -t .config/task/Taskfile.yml build:backend

      - name: Run RAG evaluation tests with coverage
        run: task -t .config/task/Taskfile.yml test:ci:rag TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/rag-evaluation"

      - name: Publish RAG evaluation test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: RAG evaluation test results
          path: ${{ env.TEST_RESULTS_DIR }}/rag-evaluation/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload RAG evaluation test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-evaluation-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/rag-evaluation
          if-no-files-found: warn

      - name: Generate RAG evaluation coverage report
        if: always()
        run: task -t .config/task/Taskfile.yml test:ci:report TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/rag-evaluation" COVERAGE_REPORT_DIR="${{ env.COVERAGE_REPORT_DIR }}/rag-evaluation"

      - name: Add RAG evaluation coverage summary
        if: always()
        shell: bash
        run: |
          summary="${{ env.COVERAGE_REPORT_DIR }}/rag-evaluation/SummaryGithub.md"
          if [ -f "$summary" ]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload RAG evaluation coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-evaluation-coverage-report
          path: ${{ env.COVERAGE_REPORT_DIR }}/rag-evaluation
          if-no-files-found: warn

  backend-architecture-tests:
    name: Backend architecture tests
    runs-on: windows-latest
    needs:
      - changes
      - backend-build
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore backend
        run: task -t .config/task/Taskfile.yml setup:backend

      - name: Build backend
        run: task -t .config/task/Taskfile.yml build:backend

      - name: Run architecture tests
        run: task -t .config/task/Taskfile.yml test:ci:architecture TEST_RESULTS_DIR="${{ env.TEST_RESULTS_DIR }}/architecture"

      - name: Publish architecture test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Architecture test results
          path: ${{ env.TEST_RESULTS_DIR }}/architecture/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload architecture test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/architecture
          if-no-files-found: warn

  frontend-format:
    name: Frontend format
    runs-on: windows-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task -t .config/task/Taskfile.yml setup:frontend

      - name: Check Prettier formatting
        run: task -t .config/task/Taskfile.yml check:frontend:format

  frontend-lint:
    name: Frontend lint
    runs-on: windows-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task -t .config/task/Taskfile.yml setup:frontend

      - name: Run ESLint
        run: task -t .config/task/Taskfile.yml check:frontend:lint

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: windows-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task -t .config/task/Taskfile.yml setup:frontend

      - name: Run TypeScript
        run: task -t .config/task/Taskfile.yml check:frontend:typecheck

  frontend-build:
    name: Frontend build
    runs-on: windows-latest
    needs:
      - changes
      - frontend-lint
      - frontend-typecheck
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task -t .config/task/Taskfile.yml setup:frontend

      - name: Build desktop frontend
        run: task -t .config/task/Taskfile.yml build:frontend

  api-contract-drift:
    name: API contract drift
    runs-on: windows-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install frontend dependencies
        run: task -t .config/task/Taskfile.yml setup:frontend

      - name: Check generated API contracts
        run: task -t .config/task/Taskfile.yml check:api-contracts

  frontend-color-guard:
    name: Frontend color guard
    runs-on: windows-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check hardcoded colors
        run: task -t .config/task/Taskfile.yml check:colors

  docker-compose:
    name: Docker compose config
    runs-on: ubuntu-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate remote compose file
        run: task -t .config/task/Taskfile.yml check:docker

  check-summary:
    name: Check summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - backend-format
      - backend-build
      - backend-unit-tests
      - backend-integration-tests
      - backend-rag-evaluation-tests
      - backend-architecture-tests
      - frontend-format
      - frontend-lint
      - frontend-typecheck
      - frontend-build
      - api-contract-drift
      - frontend-color-guard
      - docker-compose

    steps:
      - name: Summarize job results
        run: |
          echo "## Check results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Change detection | ${{ needs.changes.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend format | ${{ needs.backend-format.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend build | ${{ needs.backend-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend unit tests | ${{ needs.backend-unit-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend integration tests | ${{ needs.backend-integration-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend RAG evaluation tests | ${{ needs.backend-rag-evaluation-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend architecture tests | ${{ needs.backend-architecture-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend format | ${{ needs.frontend-format.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend lint | ${{ needs.frontend-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend typecheck | ${{ needs.frontend-typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend build | ${{ needs.frontend-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API contract drift | ${{ needs.api-contract-drift.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend color guard | ${{ needs.frontend-color-guard.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker compose config | ${{ needs.docker-compose.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any check failed
        if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')
        run: exit 1
