name: OpenAPI compatibility

on:
  push:
    paths:
      - "backend/**"
      - ".config/task/**"
      - ".github/workflows/openapi.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".config/task/**"
      - ".github/workflows/openapi.yml"
  workflow_dispatch:

concurrency:
  group: openapi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      global: ${{ steps.filter.outputs.global }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.config/task/**'
              - '.github/workflows/openapi.yml'
            global:
              - '.github/workflows/**'
              - '.config/task/**'

  openapi-compatibility:
    name: OpenAPI compatibility
    runs-on: ubuntu-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.global == 'true'

    steps:
      - name: Checkout revision
        uses: actions/checkout@v4
        with:
          path: revision

      - name: Checkout base revision
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: revision/backend/global.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate revision OpenAPI
        run: >
          task -t revision/.config/task/Taskfile.yml openapi:generate
          REPO_ROOT="${{ github.workspace }}/revision"
          OUTPUT_FILE="${{ github.workspace }}/artifacts/openapi/revision/local-api-v1.json"
          RUNTIME_ROOT="${{ github.workspace }}/artifacts/openapi/runtime/revision"
          DBNAME="knowledge-app-openapi-revision.db"

      - name: Generate base OpenAPI
        if: github.event_name == 'pull_request'
        run: >
          task -t revision/.config/task/Taskfile.yml openapi:generate
          REPO_ROOT="${{ github.workspace }}/base"
          OUTPUT_FILE="${{ github.workspace }}/artifacts/openapi/base/local-api-v1.json"
          RUNTIME_ROOT="${{ github.workspace }}/artifacts/openapi/runtime/base"
          DBNAME="knowledge-app-openapi-base.db"

      - name: Determine whether versioned baseline exists
        if: github.event_name == 'pull_request'
        id: versioned-baseline
        shell: pwsh
        run: |
          $baseSpec = Get-Content "${{ github.workspace }}/artifacts/openapi/base/local-api-v1.json" -Raw
          $hasVersionedPaths = $baseSpec.Contains('"/api/v1/')

          "available=$($hasVersionedPaths.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if (-not $hasVersionedPaths) {
            "## OpenAPI compatibility" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "Initial /api/v1 baseline is being introduced in this pull request. Breaking-change comparison starts after this versioned baseline is merged." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Detect breaking OpenAPI changes
        if: github.event_name == 'pull_request' && steps.versioned-baseline.outputs.available == 'true'
        uses: oasdiff/oasdiff-action/breaking@v0.0.48
        with:
          base: artifacts/openapi/base/local-api-v1.json
          revision: artifacts/openapi/revision/local-api-v1.json
          fail-on: WARN

      - name: Upload generated OpenAPI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-api-openapi-${{ github.run_id }}
          path: artifacts/openapi
          if-no-files-found: error
