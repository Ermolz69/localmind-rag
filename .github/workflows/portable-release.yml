name: Portable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Portable artifact version label"
        required: false
        default: "manual"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-portable:
    name: Build portable package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/global.json', 'backend/Directory.Packages.props', 'backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install frontend dependencies
        run: task -t .config/task/Taskfile.yml setup:frontend

      - name: Cache AI runtime and models
        uses: actions/cache@v4
        with:
          path: |
            runtime/ai/bin
            runtime/ai/models
          key: ai-runtime-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-ai*.ps1', 'backend/src/KnowledgeApp.Infrastructure/Resources/AiModels/*.json') }}
          restore-keys: |
            ai-runtime-${{ runner.os }}-

      - name: Build portable folder
        run: task -t .config/task/Taskfile.yml package

      - name: Smoke test portable package
        run: task -t .config/task/Taskfile.yml package:smoke-test

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: localmind-portable-win-x64
          path: artifacts/localmind-portable-win-x64.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/localmind-portable-win-x64.zip
          generate_release_notes: true
