name: Portable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Portable artifact version label"
        required: false
        default: "manual"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-portable:
    name: Build portable preview
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm.cmd install --frozen-lockfile

      - name: Run full checks before packaging
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/check.ps1

      - name: Build portable folder
        shell: powershell
        run: >
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package.ps1
          -Configuration Release
          -RuntimeIdentifier win-x64
          -OutputPath artifacts/localmind-portable-win-x64

      - name: Create portable zip
        shell: powershell
        run: Compress-Archive -Path artifacts/localmind-portable-win-x64 -DestinationPath artifacts/localmind-portable-win-x64.zip -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: localmind-portable-win-x64
          path: artifacts/localmind-portable-win-x64.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/localmind-portable-win-x64.zip
          generate_release_notes: true
