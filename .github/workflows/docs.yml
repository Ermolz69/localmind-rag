name: Docs

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: 24
  PNPM_VERSION: 10.0.0

permissions:
  contents: read

jobs:
  build-docs:
    name: Build docs
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm.cmd install --frozen-lockfile

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Restore backend
        run: task setup:backend

      - name: Build docs
        run: task docs:build

      - name: Build Storybook
        run: pnpm --filter desktop run build-storybook

      - name: Copy Storybook to docs site
        run: cp -r apps/desktop/storybook-static artifacts/docs/site/storybook

      - name: Upload docs artifact
        if: github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/docs/site

  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
