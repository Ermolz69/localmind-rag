name: Docs

on:
  push:
    paths:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - "backend/**"
      - "apps/desktop/**"
      - ".config/task/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - "backend/**"
      - "apps/desktop/**"
      - ".config/task/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: 24
  PNPM_VERSION: 10.0.0

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      global: ${{ steps.filter.outputs.global }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
              - 'AGENTS.md'
              - 'GEMINI.md'
              - '.config/task/**'
              - '.github/workflows/docs.yml'
            backend:
              - 'backend/**'
              - '.config/task/**'
              - '.github/workflows/docs.yml'
            frontend:
              - 'apps/desktop/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/docs.yml'
            global:
              - '.github/workflows/**'
              - '.config/task/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  build-docs:
    name: Build docs
    runs-on: windows-latest
    needs:
      - changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.global == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm.cmd install --frozen-lockfile

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore backend
        run: task -t .config/task/Taskfile.yml setup:backend

      - name: Build docs
        run: task -t .config/task/Taskfile.yml docs:build

      - name: Build Storybook
        run: pnpm --filter desktop run build-storybook

      - name: Copy Storybook to docs site
        run: cp -r apps/desktop/storybook-static artifacts/docs/site/storybook

      - name: Upload docs artifact
        if: github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/docs/site

  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: build-docs
    if: needs.build-docs.result == 'success' && (github.event_name == 'workflow_dispatch' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
