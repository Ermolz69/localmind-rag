version: '3'

vars:
  CONFIGURATION: 'Release'
  RUNTIME_IDENTIFIER: 'win-x64'
  RUNTIME_ROOT: 'artifacts/openapi/runtime'
  OUTPUT_DIR: 'artifacts/openapi/revision'

tasks:
  # === SETUP TASKS ===
  setup:
    desc: Complete developer environment setup
    deps: [setup:backend, setup:frontend, setup:ai, setup:ocr]

  setup:backend:
    desc: Restore backend projects and tools
    cmds:
      - dotnet restore backend/KnowledgeApp.slnx
      - dotnet tool restore

  setup:frontend:
    desc: Install frontend dependencies
    cmds:
      - pnpm install --frozen-lockfile

  setup:ai:
    desc: Sets up AI runtime and models
    deps: [setup:ai-runtime, setup:ai-models]

  setup:ai-runtime:
    desc: Sets up local AI runtime binaries (llama.cpp)
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/setup/setup-ai-runtime.ps1
        platforms: [windows]
      - cmd: echo "On Linux/macOS, please ensure llama-server is installed in your PATH or compiled."
        platforms: [linux, darwin]

  setup:ai-models:
    desc: Download required local AI GGUF models
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/setup/setup-ai-models.ps1
        platforms: [windows]
      - cmd: |
          mkdir -p runtime/ai/models
          if [ ! -f runtime/ai/models/bge-m3-Q4_K_M.gguf ]; then
            curl -L -o runtime/ai/models/bge-m3-Q4_K_M.gguf https://huggingface.co/gpustack/bge-m3-GGUF/resolve/main/bge-m3-Q4_K_M.gguf
          fi
        platforms: [linux, darwin]

  setup:ocr:
    desc: Sets up portable Tesseract OCR engine (Windows only)
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/setup/setup-ocr.ps1
        platforms: [windows]
      - cmd: echo "On Linux/macOS, please install tesseract-ocr using apt or brew."
        platforms: [linux, darwin]

  # === BUILD TASKS ===
  build:
    desc: Builds all backend and frontend projects
    deps: [build:backend, build:frontend]

  build:backend:
    desc: Builds the backend solution
    cmds:
      - dotnet build backend/KnowledgeApp.slnx

  build:frontend:
    desc: Builds the React desktop UI
    cmds:
      - pnpm --filter desktop build

  # === TEST TASKS ===
  test:
    desc: Runs all test suites
    cmds:
      - dotnet test backend/KnowledgeApp.slnx

  test:unit:
    desc: Runs backend unit tests
    cmds:
      - dotnet test backend/tests/KnowledgeApp.UnitTests/KnowledgeApp.UnitTests.csproj

  test:integration:
    desc: Runs backend integration tests
    cmds:
      - dotnet test backend/tests/KnowledgeApp.IntegrationTests/KnowledgeApp.IntegrationTests.csproj

  test:rag:
    desc: Runs backend RAG evaluation tests
    cmds:
      - dotnet test backend/tests/KnowledgeApp.RagEvaluationTests/KnowledgeApp.RagEvaluationTests.csproj

  test:architecture:
    desc: Runs backend Clean Architecture validation tests
    cmds:
      - dotnet test backend/tests/KnowledgeApp.ArchitectureTests/KnowledgeApp.ArchitectureTests.csproj

  test:coverage:
    desc: Runs tests and generates a unified HTML coverage report
    cmds:
      - cmd: rm -rf artifacts/test-results/local artifacts/coverage-report/local
      - cmd: dotnet test backend/tests/KnowledgeApp.UnitTests/KnowledgeApp.UnitTests.csproj --logger "trx" --results-directory "artifacts/test-results/local/unit" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
      - cmd: dotnet test backend/tests/KnowledgeApp.IntegrationTests/KnowledgeApp.IntegrationTests.csproj --logger "trx" --results-directory "artifacts/test-results/local/integration" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
      - cmd: dotnet test backend/tests/KnowledgeApp.RagEvaluationTests/KnowledgeApp.RagEvaluationTests.csproj --logger "trx" --results-directory "artifacts/test-results/local/rag-evaluation" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
      - cmd: dotnet test backend/tests/KnowledgeApp.ArchitectureTests/KnowledgeApp.ArchitectureTests.csproj --logger "trx" --results-directory "artifacts/test-results/local/architecture"
      - cmd: dotnet tool run reportgenerator "-reports:artifacts/test-results/local/**/coverage.cobertura.xml" "-targetdir:artifacts/coverage-report/local" "-reporttypes:Html;Cobertura;MarkdownSummaryGithub" "-assemblyfilters:+KnowledgeApp.*;-*.Tests" "-classfilters:-Microsoft.AspNetCore.OpenApi.Generated*;-System.Text.RegularExpressions.Generated*"

  test:ci:unit:
    desc: Runs backend unit tests with coverage for CI
    cmds:
      - dotnet test backend/tests/KnowledgeApp.UnitTests/KnowledgeApp.UnitTests.csproj --no-build --logger "trx" --results-directory "{{.TEST_RESULTS_DIR}}" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results/unit"}}'

  test:ci:integration:
    desc: Runs backend integration tests with coverage for CI
    cmds:
      - dotnet test backend/tests/KnowledgeApp.IntegrationTests/KnowledgeApp.IntegrationTests.csproj --no-build --logger "trx" --results-directory "{{.TEST_RESULTS_DIR}}" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results/integration"}}'

  test:ci:rag:
    desc: Runs backend RAG evaluation tests with coverage for CI
    cmds:
      - dotnet test backend/tests/KnowledgeApp.RagEvaluationTests/KnowledgeApp.RagEvaluationTests.csproj --no-build --logger "trx" --results-directory "{{.TEST_RESULTS_DIR}}" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results/rag-evaluation"}}'

  test:ci:architecture:
    desc: Runs backend Clean Architecture validation tests for CI
    cmds:
      - dotnet test backend/tests/KnowledgeApp.ArchitectureTests/KnowledgeApp.ArchitectureTests.csproj --no-build --logger "trx" --results-directory "{{.TEST_RESULTS_DIR}}"
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results/architecture"}}'

  test:ci:report:
    desc: Generates code coverage report for CI
    cmds:
      - dotnet tool run reportgenerator "-reports:{{.TEST_RESULTS_DIR}}/**/coverage.cobertura.xml" "-targetdir:{{.COVERAGE_REPORT_DIR}}" "-reporttypes:Html;Cobertura;MarkdownSummaryGithub" "-assemblyfilters:+KnowledgeApp.*;-*.Tests" "-classfilters:-Microsoft.AspNetCore.OpenApi.Generated*;-System.Text.RegularExpressions.Generated*"
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results"}}'
      COVERAGE_REPORT_DIR: '{{.COVERAGE_REPORT_DIR | default "artifacts/coverage-report"}}'

  # === VALIDATION & QUALITY TASKS ===
  check:
    desc: Executes all lints, formatting, and validation tasks
    deps: [check:backend:format, check:frontend:format, check:frontend:lint, check:frontend:typecheck, check:colors, check:docker]

  check:backend:format:
    desc: Verifies backend C# formatting
    cmds:
      - dotnet format backend/KnowledgeApp.slnx --verify-no-changes --no-restore

  check:frontend:format:
    desc: Verifies frontend Prettier formatting
    cmds:
      - pnpm --filter desktop format:check

  check:frontend:lint:
    desc: Lints the frontend TypeScript codebase
    cmds:
      - pnpm --filter desktop lint

  check:frontend:typecheck:
    desc: Validates strict TypeScript typechecking
    cmds:
      - pnpm --filter desktop typecheck

  check:colors:
    desc: Validates frontend files for hardcoded color values
    cmds:
      - node scripts/check/check-colors.js

  check:docker:
    desc: Validates Docker Compose configuration files
    cmds:
      - docker compose -f infra/docker-compose.remote.yml config

  # === DOCUMENTATION & OPENAPI ===
  docs:build:
    desc: Generates OpenAPI, .NET metadata, Swagger-UI, and builds DocFX site
    cmds:
      - cmd: rm -rf artifacts/docs/site docs/auto-generated/openapi docs/auto-generated/dotnet-api docs/auto-generated/swagger-ui
      - cmd: mkdir -p docs/auto-generated/openapi docs/auto-generated/dotnet-api docs/auto-generated/swagger-ui artifacts/docs/site
      - task: openapi:generate
        vars: { REPO_ROOT: '.', OUTPUT_FILE: 'docs/auto-generated/openapi/openapi.json', RUNTIME_ROOT: 'artifacts/docs/runtime', DBNAME: 'knowledge-app-docs.db' }
      - cmd: cp node_modules/swagger-ui-dist/swagger-ui.css docs/auto-generated/swagger-ui/
      - cmd: cp node_modules/swagger-ui-dist/swagger-ui-bundle.js docs/auto-generated/swagger-ui/
      - cmd: cp node_modules/swagger-ui-dist/swagger-ui-standalone-preset.js docs/auto-generated/swagger-ui/
      - cmd: cp node_modules/swagger-ui-dist/favicon-16x16.png docs/auto-generated/swagger-ui/
      - cmd: cp node_modules/swagger-ui-dist/favicon-32x32.png docs/auto-generated/swagger-ui/
      - cmd: dotnet tool restore
      - cmd: dotnet tool run docfx metadata docs/docfx.json
      - cmd: dotnet tool run docfx build docs/docfx.json

  openapi:generate:
    desc: Generates the OpenAPI specification JSON file
    vars:
      REPO_ROOT: '{{.REPO_ROOT | default "."}}'
      OUTPUT_FILE: '{{.OUTPUT_FILE | default "artifacts/openapi/revision/local-api-v1.json"}}'
      RUNTIME_ROOT: '{{.RUNTIME_ROOT | default "artifacts/openapi/runtime/revision"}}'
      DBNAME: '{{.DBNAME | default "knowledge-app-openapi.db"}}'
    env:
      LocalRuntime__DataPath: '{{.RUNTIME_ROOT}}/app/data'
      LocalRuntime__DatabasePath: '{{.RUNTIME_ROOT}}/app/data/{{.DBNAME}}'
      LocalRuntime__FilesPath: '{{.RUNTIME_ROOT}}/app/files'
      LocalRuntime__IndexPath: '{{.RUNTIME_ROOT}}/app/indexes'
      LocalRuntime__LogsPath: '{{.RUNTIME_ROOT}}/app/logs'
      Ai__EmbeddingProvider: 'Stub'
      Ai__RuntimePath: '{{.RUNTIME_ROOT}}/ai/bin/llama-server.exe'
      Ai__ModelsPath: '{{.RUNTIME_ROOT}}/ai/models'
      IngestionWorker__Enabled: 'false'
    cmds:
      - cmd: rm -rf {{dir .OUTPUT_FILE}} && mkdir -p {{dir .OUTPUT_FILE}} {{.RUNTIME_ROOT}}
      - cmd: dotnet build {{.REPO_ROOT}}/backend/src/KnowledgeApp.LocalApi/KnowledgeApp.LocalApi.csproj -c Release --no-incremental /p:OpenApiGenerateDocuments=true /p:OpenApiOutputFolder="{{dir .OUTPUT_FILE}}"
      # Find generated JSON and move to final target path
      - cmd: mv {{dir .OUTPUT_FILE}}/KnowledgeApp.LocalApi.json {{.OUTPUT_FILE}}

  # === PACKAGING ===
  package:
    desc: Packages localmind into a portable Windows distribution (Windows only)
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package/package.ps1 -Configuration Release -RuntimeIdentifier win-x64 -OutputPath artifacts/localmind-portable-win-x64

  package:smoke-test:
    desc: Smoke tests the packaged portable folder and zip (Windows only)
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package/test-portable-package.ps1 -PackagePath artifacts/localmind-portable-win-x64 -ZipPath artifacts/localmind-portable-win-x64.zip
