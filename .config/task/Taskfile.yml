version: "3"



vars:
  ROOT_DIR: "{{.TASKFILE_DIR}}/../.."
  CONFIGURATION: "Release"
  RUNTIME_IDENTIFIER: "win-x64"
  RUNTIME_ROOT: "{{.ROOT_DIR}}/artifacts/openapi/runtime"
  OUTPUT_DIR: "{{.ROOT_DIR}}/artifacts/openapi/revision"

tasks:
  # === SETUP TASKS ===
  setup:
    desc: Complete developer environment setup
    deps: [setup:backend, setup:frontend, setup:rust, setup:ai, setup:ocr]

  setup:backend:
    desc: Restore backend projects and tools
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet restore KnowledgeApp.slnx
      - cd "{{.ROOT_DIR}}" && dotnet tool restore

  setup:frontend:
    desc: Install frontend dependencies
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm install --frozen-lockfile

  setup:rust:
    desc: Installs Rust formatter and clippy components
    cmds:
      - rustup component add rustfmt clippy

  # === DEVELOPMENT TASKS ===
  dev:
    desc: Runs the desktop app through Tauri; Rust supervises LocalApi
    deps: [dev:desktop]

  dev:desktop:
    desc: Runs the Tauri desktop app with LocalApi supervision
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop tauri dev

  dev:frontend:
    desc: Runs only the Vite frontend without the Tauri desktop shell
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop dev

  setup:ai:
    desc: Sets up AI runtime and models
    deps: [setup:ai-runtime, setup:ai-models]

  setup:ai-runtime:
    desc: Sets up local AI runtime binaries (llama.cpp)
    cmds:
      - cmd: |
          cd "{{.ROOT_DIR}}"
          mkdir -p runtime/ai/bin runtime/ai/.tmp
          if [ ! -f runtime/ai/bin/llama-server.exe ]; then
            curl -L -f --retry 3 --retry-delay 2 -o runtime/ai/.tmp/llama.zip https://github.com/ggml-org/llama.cpp/releases/download/b9222/llama-b9222-bin-win-vulkan-x64.zip
            tar -xf runtime/ai/.tmp/llama.zip -C runtime/ai/.tmp/
            cp -r runtime/ai/.tmp/llama-b9222-bin-win-vulkan-x64/* runtime/ai/bin/ || true
            rm -rf runtime/ai/.tmp
          fi
        platforms: [windows]
      - cmd: echo "On Linux/macOS, please ensure llama-server is installed in your PATH or compiled."
        platforms: [linux, darwin]

  setup:ai-models:
    desc: Download required local AI GGUF models
    cmds:
      - cmd: |
          cd "{{.ROOT_DIR}}"
          mkdir -p runtime/ai/models
          if [ ! -f runtime/ai/models/bge-m3-Q4_K_M.gguf ]; then
            curl -L -f --retry 3 --retry-delay 2 -o runtime/ai/models/bge-m3-Q4_K_M.gguf https://huggingface.co/gpustack/bge-m3-GGUF/resolve/main/bge-m3-Q4_K_M.gguf
          fi

  setup:ocr:
    desc: Sets up portable Tesseract OCR engine (Windows only)
    cmds:
      - cmd: |
          cd "{{.ROOT_DIR}}"
          mkdir -p runtime/ocr/bin runtime/ocr/tessdata
          for lang in eng osd ukr; do
            if [ ! -f runtime/ocr/tessdata/$lang.traineddata ]; then
              curl -L -f -o runtime/ocr/tessdata/$lang.traineddata https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/$lang.traineddata
            fi
          done
          if [ ! -f runtime/ocr/bin/tesseract.exe ]; then
            if [ -f "C:/Program Files/Tesseract-OCR/tesseract.exe" ]; then
              cp "C:/Program Files/Tesseract-OCR/tesseract.exe" runtime/ocr/bin/
              cp "C:/Program Files/Tesseract-OCR/"*.dll runtime/ocr/bin/ || true
            elif [ -f "C:/Program Files (x86)/Tesseract-OCR/tesseract.exe" ]; then
              cp "C:/Program Files (x86)/Tesseract-OCR/tesseract.exe" runtime/ocr/bin/
              cp "C:/Program Files (x86)/Tesseract-OCR/"*.dll runtime/ocr/bin/ || true
            else
              echo "Tesseract not found in Program Files. Install it manually or add to PATH."
            fi
          fi
        platforms: [windows]
      - cmd: echo "On Linux/macOS, please install tesseract-ocr using apt or brew."
        platforms: [linux, darwin]

  # === BUILD TASKS ===
  build:
    desc: Builds all backend and frontend projects
    deps: [build:backend, build:frontend]

  build:backend:
    desc: Builds the backend solution
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet build KnowledgeApp.slnx -c Release --no-restore

  build:frontend:
    desc: Builds the React desktop UI
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop build

  build:tauri:
    desc: Builds the Tauri desktop shell
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop tauri build

  # === TEST TASKS ===
  test:
    desc: Runs all test suites
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test KnowledgeApp.slnx

  test:frontend:
    desc: Runs frontend unit and component tests
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop test

  test:unit:
    desc: Runs backend unit tests
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.UnitTests/KnowledgeApp.UnitTests.csproj

  test:integration:
    desc: Runs backend integration tests
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.IntegrationTests/KnowledgeApp.IntegrationTests.csproj

  test:rag:
    desc: Runs backend RAG evaluation tests
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.RagEvaluationTests/KnowledgeApp.RagEvaluationTests.csproj

  test:architecture:
    desc: Runs backend Clean Architecture validation tests
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.ArchitectureTests/KnowledgeApp.ArchitectureTests.csproj

  test:coverage:
    desc: Runs tests and generates a unified HTML coverage report
    cmds:
      - cmd: cd "{{.ROOT_DIR}}" && rm -rf artifacts/test-results/local artifacts/coverage-report/local
      - cmd: cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.UnitTests/KnowledgeApp.UnitTests.csproj --logger "trx" --results-directory "../artifacts/test-results/local/unit" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
      - cmd: cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.IntegrationTests/KnowledgeApp.IntegrationTests.csproj --logger "trx" --results-directory "../artifacts/test-results/local/integration" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
      - cmd: cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.RagEvaluationTests/KnowledgeApp.RagEvaluationTests.csproj --logger "trx" --results-directory "../artifacts/test-results/local/rag-evaluation" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
      - cmd: cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.ArchitectureTests/KnowledgeApp.ArchitectureTests.csproj --logger "trx" --results-directory "../artifacts/test-results/local/architecture"
      - cmd: cd "{{.ROOT_DIR}}" && dotnet tool run reportgenerator "-reports:artifacts/test-results/local/**/coverage.cobertura.xml" "-targetdir:artifacts/coverage-report/local" "-reporttypes:Html;Cobertura;MarkdownSummaryGithub" "-assemblyfilters:+KnowledgeApp.*;-*.Tests" "-classfilters:-Microsoft.AspNetCore.OpenApi.Generated*;-System.Text.RegularExpressions.Generated*"

  test:ci:unit:
    desc: Runs backend unit tests with coverage for CI
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.UnitTests/KnowledgeApp.UnitTests.csproj -c Release --no-build --logger "trx" --results-directory "../{{.TEST_RESULTS_DIR}}" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results/unit"}}'

  test:ci:integration:
    desc: Runs backend integration tests with coverage for CI
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.IntegrationTests/KnowledgeApp.IntegrationTests.csproj -c Release --no-build --logger "trx" --results-directory "../{{.TEST_RESULTS_DIR}}" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results/integration"}}'

  test:ci:rag:
    desc: Runs backend RAG evaluation tests with coverage for CI
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.RagEvaluationTests/KnowledgeApp.RagEvaluationTests.csproj -c Release --no-build --logger "trx" --results-directory "../{{.TEST_RESULTS_DIR}}" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results/rag-evaluation"}}'

  test:ci:architecture:
    desc: Runs backend Clean Architecture validation tests for CI
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet test tests/KnowledgeApp.ArchitectureTests/KnowledgeApp.ArchitectureTests.csproj -c Release --no-build --logger "trx" --results-directory "../{{.TEST_RESULTS_DIR}}"
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results/architecture"}}'

  test:ci:report:
    desc: Generates code coverage report for CI
    cmds:
      - cd "{{.ROOT_DIR}}" && dotnet tool run reportgenerator "-reports:{{.TEST_RESULTS_DIR}}/**/coverage.cobertura.xml" "-targetdir:{{.COVERAGE_REPORT_DIR}}" "-reporttypes:Html;Cobertura;MarkdownSummaryGithub" "-assemblyfilters:+KnowledgeApp.*;-*.Tests" "-classfilters:-Microsoft.AspNetCore.OpenApi.Generated*;-System.Text.RegularExpressions.Generated*"
    vars:
      TEST_RESULTS_DIR: '{{.TEST_RESULTS_DIR | default "artifacts/test-results"}}'
      COVERAGE_REPORT_DIR: '{{.COVERAGE_REPORT_DIR | default "artifacts/coverage-report"}}'

  # === VALIDATION & QUALITY TASKS ===
  check:quick:
    desc: Fast static checks — format, lint, typecheck, API contracts, color guard (no tests, no Rust)
    deps:
      [
        check:backend:format,
        check:frontend:format,
        check:frontend:lint,
        check:frontend:typecheck,
        check:api-contracts,
        check:colors,
      ]

  check:
    desc: Developer validation — static checks plus frontend tests; run before pushing
    deps: [check:quick, test:frontend]

  check:full:
    desc: Full local validation — all backend tests, frontend tests, and Rust checks
    deps:
      [
        check,
        test:unit,
        test:integration,
        test:rag,
        test:architecture,
        check:rust,
      ]

  check:format:
    desc: Verifies backend and frontend formatting
    deps: [check:backend:format, check:frontend:format]

  check:backend:format:
    desc: Verifies backend C# formatting
    cmds:
      - cd "{{.ROOT_DIR}}/backend" && dotnet format KnowledgeApp.slnx --verify-no-changes --no-restore

  check:frontend:format:
    desc: Verifies frontend Prettier formatting
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop format:check

  check:frontend:lint:
    desc: Lints the frontend TypeScript codebase
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop lint

  check:frontend:typecheck:
    desc: Validates strict TypeScript typechecking
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop typecheck

  check:colors:
    desc: Validates frontend files for hardcoded color values
    cmds:
      - cd "{{.ROOT_DIR}}" && node apps/desktop/scripts/check-colors.cjs

  check:rust:
    desc: Runs Rust formatting, clippy, and cargo check for the Tauri shell
    cmds:
      - task: check:rust:format
      - task: check:rust:clippy
      - task: check:rust:check

  check:rust:format:
    desc: Verifies Rust formatting
    cmds:
      - cd "{{.ROOT_DIR}}" && cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --check

  check:rust:clippy:
    desc: Lints Rust code with clippy
    cmds:
      - cd "{{.ROOT_DIR}}" && cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml -- -D warnings

  check:rust:check:
    desc: Type-checks the Tauri Rust shell
    cmds:
      - cd "{{.ROOT_DIR}}" && cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml


  # === DOCUMENTATION & OPENAPI ===
  docs:build:
    desc: Generates OpenAPI, .NET metadata, and builds DocFX site
    cmds:
      - cmd: cd "{{.ROOT_DIR}}" && rm -rf artifacts/docs/site docs/auto-generated/openapi docs/auto-generated/dotnet-api docs/auto-generated/dotnet-api-graph.json
      - cmd: cd "{{.ROOT_DIR}}" && mkdir -p docs/auto-generated/openapi docs/auto-generated/dotnet-api artifacts/docs/site
      - task: openapi:generate
        vars:
          {
            REPO_ROOT: "{{.ROOT_DIR}}",
            OUTPUT_FILE: "{{.ROOT_DIR}}/docs/auto-generated/openapi/openapi.json",
            RUNTIME_ROOT: "{{.ROOT_DIR}}/artifacts/docs/runtime",
            DBNAME: "knowledge-app-docs.db",
          }
      - cmd: cd "{{.ROOT_DIR}}" && dotnet tool restore
      - cmd: cd "{{.ROOT_DIR}}" && dotnet tool run docfx metadata docs/docfx.json
      - task: docs:graph
      - cmd: cd "{{.ROOT_DIR}}" && dotnet tool run docfx build docs/docfx.json

  docs:graph:
    desc: Generates and validates .NET API graph data (JSON) from DocFX metadata
    cmds:
      - cmd: cd "{{.ROOT_DIR}}" && node docs/tools/generate-dotnet-api-graph.cjs
      - cmd: cd "{{.ROOT_DIR}}" && node docs/tools/validate-dotnet-api-graph.cjs

  test:docs-graph:
    desc: Runs the .NET API graph generator/validator unit tests
    cmds:
      - cmd: cd "{{.ROOT_DIR}}" && node --test docs/tools/generate-dotnet-api-graph.test.cjs

  openapi:generate:
    desc: Generates the OpenAPI specification JSON file
    vars:
      REPO_ROOT: "{{.REPO_ROOT | default .ROOT_DIR}}"
      OUTPUT_FILE: '{{.OUTPUT_FILE | default (printf "%s/artifacts/openapi/revision/local-api-v1.json" .ROOT_DIR)}}'
      RUNTIME_ROOT: '{{.RUNTIME_ROOT | default (printf "%s/artifacts/openapi/runtime/revision" .ROOT_DIR)}}'
      DBNAME: '{{.DBNAME | default "knowledge-app-openapi.db"}}'
    env:
      LocalRuntime__DataPath: "{{.RUNTIME_ROOT}}/app/data"
      LocalRuntime__DatabasePath: "{{.RUNTIME_ROOT}}/app/data/{{.DBNAME}}"
      LocalRuntime__FilesPath: "{{.RUNTIME_ROOT}}/app/files"
      LocalRuntime__IndexPath: "{{.RUNTIME_ROOT}}/app/indexes"
      LocalRuntime__LogsPath: "{{.RUNTIME_ROOT}}/app/logs"
      Ai__EmbeddingProvider: "Stub"
      Ai__RuntimePath: "{{.RUNTIME_ROOT}}/ai/bin/llama-server.exe"
      Ai__ModelsPath: "{{.RUNTIME_ROOT}}/ai/models"
      IngestionWorker__Enabled: "false"
    cmds:
      - cmd: rm -rf "{{dir .OUTPUT_FILE}}" && mkdir -p "{{dir .OUTPUT_FILE}}" "{{.RUNTIME_ROOT}}"
      - cmd: dotnet build "{{.REPO_ROOT}}/backend/src/KnowledgeApp.LocalApi/KnowledgeApp.LocalApi.csproj" -c Release --no-incremental /p:OpenApiGenerateDocuments=true /p:OpenApiOutputFolder="{{dir .OUTPUT_FILE}}"
      # Find generated JSON and move to final target path
      - cmd: mv "{{dir .OUTPUT_FILE}}/KnowledgeApp.LocalApi.json" "{{.OUTPUT_FILE}}"

  api:generate:
    desc: Generates the LocalApi OpenAPI specification and frontend TypeScript contracts
    cmds:
      - task: openapi:generate
        vars:
          OUTPUT_FILE: "{{.ROOT_DIR}}/artifacts/openapi/frontend/local-api-v1.json"
          RUNTIME_ROOT: "{{.ROOT_DIR}}/artifacts/openapi/runtime/frontend"
          DBNAME: "knowledge-app-frontend-openapi.db"
      - cd "{{.ROOT_DIR}}" && pnpm --filter desktop generate:api

  check:api-contracts:
    desc: Verifies that committed frontend contracts match the generated LocalApi OpenAPI specification
    cmds:
      - task: api:generate
      - cd "{{.ROOT_DIR}}" && git diff --exit-code -- apps/desktop/src/shared/contracts/generated.ts

  # === PACKAGING ===
  package:
    desc: Packages localmind into a portable Windows distribution (Windows only)
    vars:
      CONFIGURATION: '{{.CONFIGURATION | default "Release"}}'
      RUNTIME_IDENTIFIER: '{{.RUNTIME_IDENTIFIER | default "win-x64"}}'
      PORTABLE_OUTPUT_DIR: '{{.PORTABLE_OUTPUT_DIR | default "artifacts/localmind-portable-win-x64"}}'
    cmds:
      - cmd: cd "{{.ROOT_DIR}}" && rm -rf "{{.PORTABLE_OUTPUT_DIR}}" "{{.PORTABLE_OUTPUT_DIR}}.zip"
      - cmd: cd "{{.ROOT_DIR}}" && mkdir -p "{{.PORTABLE_OUTPUT_DIR}}/bin" "{{.PORTABLE_OUTPUT_DIR}}/config" "{{.PORTABLE_OUTPUT_DIR}}/runtime/app/data" "{{.PORTABLE_OUTPUT_DIR}}/runtime/app/files" "{{.PORTABLE_OUTPUT_DIR}}/runtime/app/indexes" "{{.PORTABLE_OUTPUT_DIR}}/runtime/app/logs" "{{.PORTABLE_OUTPUT_DIR}}/runtime/ai/bin" "{{.PORTABLE_OUTPUT_DIR}}/runtime/ai/models"
      - cmd: cd "{{.ROOT_DIR}}" && dotnet publish backend/src/KnowledgeApp.LocalApi/KnowledgeApp.LocalApi.csproj -c {{.CONFIGURATION}} -r {{.RUNTIME_IDENTIFIER}} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o "{{.PORTABLE_OUTPUT_DIR}}/bin"
      - cmd: cd "{{.ROOT_DIR}}" && pnpm --filter desktop run tauri build --no-bundle
      - cmd: cd "{{.ROOT_DIR}}" && cp apps/desktop/src-tauri/target/release/localmind.exe "{{.PORTABLE_OUTPUT_DIR}}/localmind.exe"
      - cmd: cd "{{.ROOT_DIR}}" && cp backend/src/KnowledgeApp.LocalApi/appsettings.json "{{.PORTABLE_OUTPUT_DIR}}/config/appsettings.json"
      - cmd: cd "{{.ROOT_DIR}}" && cp backend/src/KnowledgeApp.LocalApi/appsettings.json "{{.PORTABLE_OUTPUT_DIR}}/appsettings.json"
      - cmd: cd "{{.ROOT_DIR}}" && cp -r runtime/ai/bin/. "{{.PORTABLE_OUTPUT_DIR}}/runtime/ai/bin/"
      - cmd: cd "{{.ROOT_DIR}}" && cp -r runtime/ai/models/. "{{.PORTABLE_OUTPUT_DIR}}/runtime/ai/models/"
      - cmd: |
          cd "{{.ROOT_DIR}}"
          cat << 'EOF' > "{{.PORTABLE_OUTPUT_DIR}}/README.txt"
          localmind portable

          Contents:
          - localmind.exe: Tauri desktop shell
          - bin/KnowledgeApp.LocalApi.exe: local API sidecar
          - runtime/app/: portable SQLite, files, indexes, logs
          - runtime/ai/: local AI runtime binaries and models after first-run setup
          - config/appsettings.json: portable runtime settings

          Run localmind.exe. The desktop shell starts the LocalApi sidecar automatically.
          If local AI assets are missing, use the in-app first-run AI setup action.
          EOF
      - cmd: |
          cd "{{.ROOT_DIR}}"
          cat << 'EOF' > "{{.PORTABLE_OUTPUT_DIR}}/.env.example"
          KNOWLEDGE_APP_PORTABLE=true
          LOCAL_API_URL=http://127.0.0.1:49321
          LOCAL_STORAGE_PATH=runtime/app/files
          LOCAL_DATABASE_PATH=runtime/app/data/knowledge-app.db
          LOCAL_INDEX_PATH=runtime/app/indexes
          EOF
      - cmd: cd "{{.ROOT_DIR}}" && powershell -NoProfile -Command "Compress-Archive -Path '{{.PORTABLE_OUTPUT_DIR}}' -DestinationPath '{{.PORTABLE_OUTPUT_DIR}}.zip' -Force"

  package:smoke-test:
    desc: Smoke tests the packaged portable folder and zip (Windows only)
    vars:
      PORTABLE_OUTPUT_DIR: '{{.PORTABLE_OUTPUT_DIR | default "artifacts/localmind-portable-win-x64"}}'
    cmds:
      - cmd: |
          cd "{{.ROOT_DIR}}"
          for path in \
            "{{.PORTABLE_OUTPUT_DIR}}/localmind.exe" \
            "{{.PORTABLE_OUTPUT_DIR}}/bin/KnowledgeApp.LocalApi.exe" \
            "{{.PORTABLE_OUTPUT_DIR}}/config/appsettings.json" \
            "{{.PORTABLE_OUTPUT_DIR}}/appsettings.json" \
            "{{.PORTABLE_OUTPUT_DIR}}/README.txt" \
            "{{.PORTABLE_OUTPUT_DIR}}.zip" \
          ; do
            if [ ! -s "$path" ]; then
              echo "Smoke test failed: $path is missing or empty"
              exit 1
            fi
          done
          for dir in \
            "{{.PORTABLE_OUTPUT_DIR}}/runtime/app/data" \
            "{{.PORTABLE_OUTPUT_DIR}}/runtime/app/files" \
            "{{.PORTABLE_OUTPUT_DIR}}/runtime/app/indexes" \
            "{{.PORTABLE_OUTPUT_DIR}}/runtime/app/logs" \
            "{{.PORTABLE_OUTPUT_DIR}}/runtime/ai/bin" \
            "{{.PORTABLE_OUTPUT_DIR}}/runtime/ai/models" \
          ; do
            if [ ! -d "$dir" ]; then
              echo "Smoke test failed: directory $dir is missing"
              exit 1
            fi
          done
          echo "Smoke test passed."
