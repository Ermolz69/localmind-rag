version: "3"

vars:
  ROOT_DIR: "{{.TASKFILE_DIR}}/../.."
  SERVICES_DIR: "{{.ROOT_DIR}}/services"
  AUTH_DIR: "{{.SERVICES_DIR}}/auth-service"
  FILE_DIR: "{{.SERVICES_DIR}}/file-service"
  SYNC_DIR: "{{.SERVICES_DIR}}/sync-service"
  GATEWAY_DIR: "{{.SERVICES_DIR}}/api-gateway"
  SERVICES_ARTIFACTS_DIR: "{{.ROOT_DIR}}/artifacts/services"

tasks:
  setup:
    desc: Restore/install dependencies for all microservices
    deps: [auth:setup, file:setup, sync:restore, gateway:restore]

  build:
    desc: Build all microservices
    deps: [auth:build, file:build, sync:build, gateway:build]

  test:
    desc: Run tests for all microservices
    deps: [auth:test, file:test, sync:test, gateway:test]

  test:coverage:
    desc: Run coverage for all microservices that support it
    deps: [auth:test:coverage, file:test:coverage, sync:test:coverage]

  check:
    desc: Run quality checks for all microservices
    deps: [auth:check, file:check, sync:check, gateway:check]

  docker:config:
    desc: Validate microservice Docker Compose files
    cmds:
      - cmd: cd "{{.AUTH_DIR}}" && docker compose config
        ignore_error: true

  docker:up:
    desc: Start microservice local dependencies
    cmds:
      - cd "{{.AUTH_DIR}}" && docker compose up -d

  docker:down:
    desc: Stop microservice local dependencies
    cmds:
      - cd "{{.AUTH_DIR}}" && docker compose down

  auth:setup:
    desc: Install Node dependencies for auth-service
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm install --frozen-lockfile

  auth:build:
    desc: Build auth-service
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter auth-service build

  auth:lint:
    desc: Run auth-service ESLint
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter auth-service lint

  auth:test:
    desc: Run auth-service unit tests
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter auth-service test

  auth:test:coverage:
    desc: Run auth-service tests with coverage
    cmds:
      - cmd: cd "{{.ROOT_DIR}}" && rm -rf "{{.SERVICES_ARTIFACTS_DIR}}/coverage/auth-service" "{{.SERVICES_ARTIFACTS_DIR}}/test-results/auth-service"
        platforms: [linux, darwin]
      - cmd: cd "{{.ROOT_DIR}}" && powershell -NoProfile -Command "Remove-Item -Recurse -Force '{{.SERVICES_ARTIFACTS_DIR}}/coverage/auth-service','{{.SERVICES_ARTIFACTS_DIR}}/test-results/auth-service' -ErrorAction SilentlyContinue"
        platforms: [windows]
      - cd "{{.ROOT_DIR}}" && pnpm --filter auth-service test:cov
      - cmd: cd "{{.ROOT_DIR}}" && mkdir -p "{{.SERVICES_ARTIFACTS_DIR}}/coverage/auth-service" && cp -R "{{.AUTH_DIR}}/coverage/." "{{.SERVICES_ARTIFACTS_DIR}}/coverage/auth-service/"
        platforms: [linux, darwin]
      - cmd: cd "{{.ROOT_DIR}}" && powershell -NoProfile -Command "New-Item -ItemType Directory -Force '{{.SERVICES_ARTIFACTS_DIR}}/coverage/auth-service' | Out-Null; if (Test-Path '{{.AUTH_DIR}}/coverage') { Copy-Item -Recurse -Force '{{.AUTH_DIR}}/coverage/*' '{{.SERVICES_ARTIFACTS_DIR}}/coverage/auth-service/' }"
        platforms: [windows]

  auth:check:
    desc: Run auth-service lint, tests, and build
    deps: [auth:lint, auth:test, auth:build]

  auth:start:
    desc: Start auth-service
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter auth-service start

  auth:start:dev:
    desc: Start auth-service in watch mode
    cmds:
      - cd "{{.ROOT_DIR}}" && pnpm --filter auth-service start:dev

  file:setup:
    desc: Verify file-service Gradle wrapper
    cmds:
      - cmd: cd "{{.FILE_DIR}}" && ./gradlew --version
        platforms: [linux, darwin]
      - cmd: cd "{{.FILE_DIR}}" && cmd /c gradlew.bat --version
        platforms: [windows]

  file:build:
    desc: Build file-service
    cmds:
      - cmd: cd "{{.FILE_DIR}}" && ./gradlew build
        platforms: [linux, darwin]
      - cmd: cd "{{.FILE_DIR}}" && cmd /c gradlew.bat build
        platforms: [windows]

  file:test:
    desc: Run file-service tests
    cmds:
      - cmd: cd "{{.FILE_DIR}}" && ./gradlew test
        platforms: [linux, darwin]
      - cmd: cd "{{.FILE_DIR}}" && cmd /c gradlew.bat test
        platforms: [windows]

  file:test:coverage:
    desc: Run file-service tests with JaCoCo coverage
    cmds:
      - cmd: cd "{{.ROOT_DIR}}" && rm -rf "{{.SERVICES_ARTIFACTS_DIR}}/coverage/file-service" "{{.SERVICES_ARTIFACTS_DIR}}/test-results/file-service"
        platforms: [linux, darwin]
      - cmd: cd "{{.ROOT_DIR}}" && powershell -NoProfile -Command "Remove-Item -Recurse -Force '{{.SERVICES_ARTIFACTS_DIR}}/coverage/file-service','{{.SERVICES_ARTIFACTS_DIR}}/test-results/file-service' -ErrorAction SilentlyContinue"
        platforms: [windows]
      - cmd: cd "{{.FILE_DIR}}" && ./gradlew test jacocoTestReport
        platforms: [linux, darwin]
      - cmd: cd "{{.FILE_DIR}}" && cmd /c gradlew.bat test jacocoTestReport
        platforms: [windows]
      - cmd: cd "{{.ROOT_DIR}}" && mkdir -p "{{.SERVICES_ARTIFACTS_DIR}}/coverage/file-service" "{{.SERVICES_ARTIFACTS_DIR}}/test-results/file-service" && cp -R "{{.FILE_DIR}}/build/reports/jacoco/test/." "{{.SERVICES_ARTIFACTS_DIR}}/coverage/file-service/" && cp -R "{{.FILE_DIR}}/build/test-results/test/." "{{.SERVICES_ARTIFACTS_DIR}}/test-results/file-service/"
        platforms: [linux, darwin]
      - cmd: cd "{{.ROOT_DIR}}" && powershell -NoProfile -Command "New-Item -ItemType Directory -Force '{{.SERVICES_ARTIFACTS_DIR}}/coverage/file-service','{{.SERVICES_ARTIFACTS_DIR}}/test-results/file-service' | Out-Null; if (Test-Path '{{.FILE_DIR}}/build/reports/jacoco/test') { Copy-Item -Recurse -Force '{{.FILE_DIR}}/build/reports/jacoco/test/*' '{{.SERVICES_ARTIFACTS_DIR}}/coverage/file-service/' }; if (Test-Path '{{.FILE_DIR}}/build/test-results/test') { Copy-Item -Recurse -Force '{{.FILE_DIR}}/build/test-results/test/*' '{{.SERVICES_ARTIFACTS_DIR}}/test-results/file-service/' }"
        platforms: [windows]

  file:check:
    desc: Run file-service build and tests
    deps: [file:build, file:test]

  file:start:
    desc: Start file-service with local profile
    cmds:
      - cmd: cd "{{.FILE_DIR}}" && ./gradlew bootRun --args='--spring.profiles.active=local'
        platforms: [linux, darwin]
      - cmd: cd "{{.FILE_DIR}}" && cmd /c gradlew.bat bootRun --args='--spring.profiles.active=local'
        platforms: [windows]

  file:start:dev:
    desc: Start file-service in local development mode
    cmds:
      - task: file:start

  sync:restore:
    desc: Restore sync-service dependencies
    cmds:
      - cd "{{.SYNC_DIR}}" && dotnet restore LocalMind.Sync.slnx

  sync:build:
    desc: Build sync-service
    cmds:
      - cd "{{.SYNC_DIR}}" && dotnet build LocalMind.Sync.slnx

  sync:test:
    desc: Run sync-service tests
    cmds:
      - cd "{{.SYNC_DIR}}" && dotnet test LocalMind.Sync.slnx

  sync:test:coverage:
    desc: Run sync-service tests with coverage
    cmds:
      - cmd: cd "{{.ROOT_DIR}}" && rm -rf "{{.SERVICES_ARTIFACTS_DIR}}/coverage/sync-service" "{{.SERVICES_ARTIFACTS_DIR}}/test-results/sync-service"
        platforms: [linux, darwin]
      - cmd: cd "{{.ROOT_DIR}}" && powershell -NoProfile -Command "Remove-Item -Recurse -Force '{{.SERVICES_ARTIFACTS_DIR}}/coverage/sync-service','{{.SERVICES_ARTIFACTS_DIR}}/test-results/sync-service' -ErrorAction SilentlyContinue"
        platforms: [windows]
      - cd "{{.SYNC_DIR}}" && dotnet test LocalMind.Sync.slnx --logger "trx" --results-directory "{{.SERVICES_ARTIFACTS_DIR}}/test-results/sync-service" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

  sync:check:
    desc: Run sync-service restore, build, and tests
    deps: [sync:restore, sync:build, sync:test]

  sync:start:api:
    desc: Start sync-service API
    cmds:
      - cd "{{.SYNC_DIR}}" && dotnet run --project src/LocalMind.Sync.Api/LocalMind.Sync.Api.csproj

  sync:start:worker:
    desc: Start sync-service worker
    cmds:
      - cd "{{.SYNC_DIR}}" && dotnet run --project src/LocalMind.Sync.Worker/LocalMind.Sync.Worker.csproj

  gateway:restore:
    desc: Restore api-gateway dependencies
    cmds:
      - cd "{{.GATEWAY_DIR}}" && dotnet restore LocalMind.ApiGateway.slnx

  gateway:build:
    desc: Build api-gateway
    cmds:
      - cd "{{.GATEWAY_DIR}}" && dotnet build LocalMind.ApiGateway.slnx

  gateway:test:
    desc: Run api-gateway tests when test projects exist
    cmds:
      - cmd: |
          cd "{{.GATEWAY_DIR}}"
          if find tests -name "*.csproj" -print -quit 2>/dev/null | grep -q .; then
            dotnet test LocalMind.ApiGateway.slnx
          else
            echo "No api-gateway test projects configured yet."
          fi
        platforms: [linux, darwin]
      - cmd: cd "{{.GATEWAY_DIR}}" && powershell -NoProfile -Command '$testProjects = Get-ChildItem -Path tests -Recurse -Filter *.csproj -ErrorAction SilentlyContinue; if ($testProjects) { dotnet test LocalMind.ApiGateway.slnx } else { Write-Host "No api-gateway test projects configured yet." }'
        platforms: [windows]

  gateway:check:
    desc: Run api-gateway restore, build, and tests
    deps: [gateway:restore, gateway:build, gateway:test]

  gateway:start:
    desc: Start api-gateway
    cmds:
      - cd "{{.GATEWAY_DIR}}" && dotnet run --project src/LocalMind.ApiGateway.Api/LocalMind.ApiGateway.Api.csproj
