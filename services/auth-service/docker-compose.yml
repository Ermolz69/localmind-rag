services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: knowledge_app
      POSTGRES_USER: knowledge_app
      POSTGRES_PASSWORD: knowledge_app_password
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
