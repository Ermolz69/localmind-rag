services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_app}
      POSTGRES_USER: ${POSTGRES_USER:-knowledge_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowledge_app_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - localmind-postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  localmind-postgres:
